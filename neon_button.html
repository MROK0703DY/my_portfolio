<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="description" content="This is the basic HTML-5 template needed to start a webpage from scratch. The meta description tag describes what the page is about. Should be over 50 characters and less than around 160 characters. Search engines sometimes this is used to provide a preview snippet.">
        <meta name="keywords" content="basic, html, template">
        <title>Sample</title>
        <!-- CSS file to load -->
        <link rel="stylesheet" href="">

        <!-- CSS styles -->
        <style>
            body {
              background: #31202b;
              display: flex;
              flex-direction: row;
              align-items: center;
              justify-content:center;
              height:100vh;
              font-size: 14px;
            }
            .neon {
              color: #ff14bd;
              border: .4rem solid #ff14bd;
              border-radius: 1rem;
              background: transparent;
              font-size: 3rem;
              padding: .8rem;
              font-family: 'Futura PT';
              position: relative;
              cursor: pointer;
              box-shadow: inset 0 0 0.5em 0 #ff14bd, 0 0 0.5em 0 #ff14bd;
            }

            .neon:before {
              content: '';
              position: absolute;
              background: #ff14bd;
              box-sizing: border-box;
              width: 100%;
              height: 100%;
              transform: perspective(1em) rotateX(40deg) scale(1, 0.3);
              filter: blur(1em);
              bottom: -2em;
              opacity: 0.7;
            }

            .neon:hover {
              background: #ff14bd;
              color: #fff;
              box-shadow: 0 0 2em 0.5em #ff14bd;
            }

            .neon:hover:before {
              opacity: 1;
            }

        </style>
    </head>

    <body>

        <button id="btn" class="neon">Неоновая кнопка</button>

        <!-- javascript file to load -->
        <script src=""></script>

        <!-- javascript code -->
        <script>
            document.getElementById('btn').addEventListener('click', function() {
                alert('Неоновая кнопка!');
              });
        </script>
    </body>
</html>
