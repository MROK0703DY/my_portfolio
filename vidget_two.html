<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description" content="This is the basic HTML-5 template needed to start a webpage from scratch. The meta description tag describes what the page is about. Should be over 50 characters and less than around 160 characters. Search engines sometimes this is used to provide a preview snippet.">
    <meta name="keywords" content="basic, html, template">
    <title>Title of Your Page</title>
    <!-- CSS file to load -->
    <link rel="stylesheet" href="css/vidget.css">
</head>

<body>
    <h1>Title of Your Page</h1>
    
    <p>The title of your page should match the title tag in the head.</p>
    
    <div class="dev-card">
    <div class="card-header">
        <span class="badge">Python-ориентированный Full-stack / Automation Engineer</span>
        <h2>My skills</h2>
    </div>
    
    <div class="stats">
        <div class="stat-item">
            <span class="value">3</span>
            <span class="label">Проекта</span>
        </div>
        <div class="stat-item">
            <span class="value" id="exp-years">3+</span>
            <span class="label">Года опыта</span>
        </div>
    </div>

    <div class="skills">
        <span class="skill-tag">Python</span>
        <span class="skill-tag">Dgango</span>
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">Playwright</span>
    </div>

    <button id="neon" class="contact-btn">Связаться</button>
</div>
    
    <!-- javascript file to load -->
    <script src="#"></script>
    
    <!-- javascript code -->
    <script>
        document.getElementById('neon').addEventListener('click', function() {
            alert('Тяночка просит 100 руб!');
          });
    </script>
</body>
</html>
