name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: # Позволяет запускать вручную кнопкой

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true # Отменяет старые запуски, чтобы не было дублей

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build public folder
        run: |
          mkdir -p public
          cp *.html public/ 2>/dev/null || true
          [ -d css ] && cp -r css public/
          [ -d js ] && cp -r js public/
          [ -d img ] && cp -r img public/
          [ -f config.json ] && cp config.json public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
