stages:
  - deploy

pages:
  stage: deploy
  script:
    - echo "Cleaning up public folder..."
    - if (Test-Path public) { Remove-Item -Recurse -Force public }
    - New-Item -ItemType Directory -Path public -Force

    - echo "Copying files..."
    # Копируем HTML
    - Get-ChildItem -Filter *.html | Copy-Item -Destination public

    # Копируем папки (проверяем наличие каждой)
    - if (Test-Path css) { Copy-Item -Recurse -Force css public }
    - if (Test-Path js) { Copy-Item -Recurse -Force js public }
    - if (Test-Path img) { Copy-Item -Recurse -Force img public }
    - if (Test-Path config.json) { Copy-Item -Force config.json public }

    - echo "Done."
  artifacts:
    paths:
      - public
  only:
    - main
    - master
